<!DOCTYPE html>
<html>

<head>
    <meta charset="UTF-8">
    <link rel="stylesheet" href="style.css">
    <title>Free Map</title>
</head>

<body>
    <!-- Translator -->
    <div id="google_translate_element"></div>
    <script>
        function googleTranslateElementInit() {
            new google.translate.TranslateElement(
                { pageLanguage: "th" },
                "google_translate_element"
            );
        }
    </script>
    <script src="https://translate.google.com/translate_a/element.js?cb=googleTranslateElementInit"></script>

    <!-- Input -->
    <form id="form" enctype="multipart/form-data">
        Name: <input type="text" id="name"><br>
        Thumbnail (upload): <input type="file" id="thumbnail" accept="image/*"><br>
        Location: <input type="text" id="loc"><br>
        Food: <input type="text" id="food"><br>
        Description: <input type="text" id="des"><br>
        Link: <input type="url" id="link" placeholder="https://..."><br>
        <input type="hidden" id="lat" name="lat">
        <input type="hidden" id="lng" name="lng">
        <p id="selected-coords">Right-click or tap on the map to choose location.</p>
        <button type="submit">Submit</button>
    </form>

    <!-- Map -->
    <div id="map"></div>
    <script src="script.js"></script>
    <script async defer
        src="https://maps.googleapis.com/maps/api/js?key=AIzaSyAtNntuBq-QLwqvtZBaHTDZu70I-AcT-io&callback=initMap">
    </script>

</body>

</html>
